<script>
// ═══════════════════════════════════════════════════════
//  DONNÉES ENTREPRISE
// ═══════════════════════════════════════════════════════
const CP = {
  societe:   "Cathy Pets SAS",
  gerante:   "Cathy DELORME",
  siret:     "928 564 269",
  rcs:       "R.C.S Soissons",
  tva:       "FR65928564269",
  rcp:       "Hiscox — HSXIN320028640M",
  adresse:   "6 Chemin Du Lavoir",
  cp_ville:  "02470 Neuilly-Saint-Front",
  tel_taxi:  "07.81.30.41.10",
  tel_garde: "07.83.43.63.06",
  email:     "cathydelormepets@gmail.com",
  site:      "cathypetsitter.com",
  iban:      "FR__ ____ ____ ____ ____ ____",
  bic:       "__________",
};
const TARIF_A = 0.90, TARIF_R = 0.85;

// ═══════════════════════════════════════════════════════
//  STATE GLOBAL
// ═══════════════════════════════════════════════════════
let state = {
  tab: location.hash.replace("#","") || "matin",
  checks: {},
  ai: { briefing:"", rdv:"", emails:"", suggestion:"" },
  loading: {},
  devis: {
    client:"", email:"", tel:"", typeClient:"particulier",
    villeD:"", cpD:"", paysD:"France",
    villeA:"", cpA:"", paysA:"France",
    retour:"oui", villeR:"Neuilly-Saint-Front", cpR:"02470",
    kmA:"", kmR:"", nbAnim:"2", typeAnim:"chat",
    dateTransport:"", notes:""
  },
  factures: [],
  quoteNum: genNum(),
};

function genNum() {
  const d = new Date();
  return `CP-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}-${String(Math.floor(Math.random()*900)+100)}`;
}

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const eur = v => `${parseFloat(v).toFixed(2)} €`;
const todayFR = () => new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});
const todayISO = () => new Date().toISOString().split("T")[0];
const validityDate = () => { const d=new Date(); d.setDate(d.getDate()+30); return d.toLocaleDateString("fr-FR"); };

function calcDevis() {
  const kmA = parseFloat(state.devis.kmA)||0;
  const kmR = state.devis.retour==="oui" ? (parseFloat(state.devis.kmR)||kmA) : 0;
  const allerTTC  = +(kmA*TARIF_A).toFixed(2);
  const retourTTC = +(kmR*TARIF_R).toFixed(2);
  const totalTTC  = +(allerTTC+retourTTC).toFixed(2);
  const totalHT   = +(totalTTC/1.20).toFixed(2);
  const tvaMnt    = +(totalTTC-totalHT).toFixed(2);
  const acompte   = +(totalTTC*0.5).toFixed(2);
  return { kmA, kmR, allerTTC, retourTTC, totalTTC, totalHT, tvaMnt, acompte, solde: acompte };
}

// ═══════════════════════════════════════════════════════
//  API CLAUDE
// ═══════════════════════════════════════════════════════
async function callClaude(prompt, mcp=false) {
  const body = {
    model:"claude-sonnet-4-20250514", max_tokens:800,
    messages:[{role:"user",content:prompt}]
  };
  if (mcp) body.mcp_servers = [
    {type:"url",url:"https://gmail.mcp.claude.com/mcp",name:"gmail"},
    {type:"url",url:"https://gcal.mcp.claude.com/mcp",name:"gcal"}
  ];
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)
  });
  const d = await r.json();
  return (d.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("\n");
}

// ═══════════════════════════════════════════════════════
//  GÉNÉRATION PDF DEVIS
// ═══════════════════════════════════════════════════════
function genPDF(type="devis") {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:"portrait", unit:"mm", format:"a4" });
  const c = calcDevis();
  const d = state.devis;
  const num = state.quoteNum;
  const W = 210, M = 14;

  // Fond header
  doc.setFillColor(26,122,110);
  doc.roundedRect(M, 10, W-M*2, 32, 4, 4, "F");

  // Titre société
  doc.setTextColor(255,255,255);
  doc.setFontSize(16); doc.setFont("helvetica","bold");
  doc.text("CATHY PETS", M+6, 22);
  doc.setFontSize(8); doc.setFont("helvetica","normal");
  doc.text("Petsitter & Taxi Animaliers Domestiques & Sauvages", M+6, 28);
  doc.text(`${CP.adresse} · ${CP.cp_ville}`, M+6, 33);

  // Coordonnées droite
  doc.setFontSize(8);
  doc.text([`Taxi : ${CP.tel_taxi}`, `Garde : ${CP.tel_garde}`, CP.email, CP.site], W-M-6, 22, {align:"right"});

  // Ligne dorée
  doc.setDrawColor(212,168,67); doc.setLineWidth(0.8);
  doc.line(M, 44, W-M, 44);

  // Type document
  const titre = type==="devis" ? "DEVIS DE TRANSPORT ANIMALIER" : "FACTURE DE TRANSPORT ANIMALIER";
  doc.setTextColor(26,122,110); doc.setFontSize(13); doc.setFont("helvetica","bold");
  doc.text(titre, M, 53);

  // Numéro et dates
  doc.setTextColor(100,100,100); doc.setFontSize(8); doc.setFont("helvetica","normal");
  const label = type==="devis" ? "Devis" : "Facture";
  doc.text([
    `N° ${num}`,
    `Émis le : ${new Date().toLocaleDateString("fr-FR")}`,
    type==="devis" ? `Valable jusqu'au : ${validityDate()}` : `Date prestation : ${d.dateTransport||"__________"}`,
  ], W-M, 50, {align:"right"});

  // Séparateur
  doc.setDrawColor(200,222,221); doc.setLineWidth(0.3);
  doc.line(M, 57, W-M, 57);

  // Bloc client
  doc.setFillColor(232,245,243);
  doc.roundedRect(M, 60, W-M*2, 28, 3, 3, "F");
  doc.setTextColor(26,122,110); doc.setFontSize(8); doc.setFont("helvetica","bold");
  doc.text("CLIENT", M+4, 67);
  doc.setTextColor(50,50,50); doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text(d.client||"________________", M+4, 74);
  doc.setFontSize(8); doc.setTextColor(100,100,100);
  doc.text(`Tél : ${d.tel||"________________"}   Email : ${d.email||"________________"}`, M+4, 80);
  doc.text(`Type client : ${d.typeClient==="professionnel" ? "Professionnel (B2B)" : "Particulier (B2C)"}`, M+4, 85);

  // Bandeaux trajets
  let y = 95;

  // Aller
  doc.setFillColor(30,95,173);
  doc.roundedRect(M, y, (W-M*2-4)/2, 26, 3, 3, "F");
  doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont("helvetica","bold");
  doc.text("ALLER — AVEC ANIMAUX", M+4, y+7);
  doc.setFont("helvetica","normal"); doc.setFontSize(8);
  doc.text(`${d.villeD||"___"} ${d.cpD||""} (${d.paysD})`, M+4, y+13);
  doc.setFont("helvetica","bold");
  doc.text("→", M+4, y+18);
  doc.setFont("helvetica","normal");
  doc.text(`${d.villeA||"___"} ${d.cpA||""} (${d.paysA})`, M+10, y+18);
  doc.setFontSize(7.5);
  doc.text(`${c.kmA} km · ${d.nbAnim} ${d.typeAnim}`, M+4, y+23);

  // Retour
  if (d.retour==="oui") {
    const xR = M + (W-M*2-4)/2 + 4;
    doc.setFillColor(123,45,139);
    doc.roundedRect(xR, y, (W-M*2-4)/2, 26, 3, 3, "F");
    doc.setTextColor(255,255,255); doc.setFontSize(7); doc.setFont("helvetica","bold");
    doc.text("RETOUR — A VIDE", xR+4, y+7);
    doc.setFont("helvetica","normal"); doc.setFontSize(8);
    doc.text(`${d.villeA||"___"} (${d.paysA})`, xR+4, y+13);
    doc.setFont("helvetica","bold"); doc.text("→", xR+4, y+18);
    doc.setFont("helvetica","normal");
    doc.text(`${d.villeR||"Neuilly-Saint-Front"}`, xR+10, y+18);
    doc.setFontSize(7.5);
    doc.text(`${c.kmR} km`, xR+4, y+23);
  }

  y += 32;

  // Table prestations
  const cols = [10, 62, 52, 28, 28];
  const headers = ["N°", "Prestation", "Détail / Itinéraire", "Distance", "Montant TTC"];
  const startX = M;
  let tx = startX;

  // Header table
  doc.setFillColor(26,122,110);
  doc.rect(M, y, W-M*2, 8, "F");
  doc.setTextColor(255,255,255); doc.setFontSize(7.5); doc.setFont("helvetica","bold");
  headers.forEach((h,i) => {
    doc.text(h, tx+cols[i]/2, y+5.5, {align:"center"});
    tx += cols[i];
  });

  y += 8;

  // Lignes table
  const rows = [
    ["1", `Transport aller\n${d.nbAnim} ${d.typeAnim}`, `${d.villeD||"___"} → ${d.villeA||"___"}`, `${c.kmA} km`, eur(c.allerTTC)],
    ...(d.retour==="oui" ? [["2", "Retour à vide", `${d.villeA||"___"} → ${d.villeR||"Neuilly"}`, `${c.kmR} km`, eur(c.retourTTC)]] : []),
    ["3", "Péages inclus", "France, Belgique, Pays-Bas", "Inclus", "Inclus"],
    ["4", "RC Pro incluse", "Hiscox HSXIN320028640M", "Inclus", "Inclus"],
  ];

  rows.forEach((row, ri) => {
    if (ri % 2 === 0) { doc.setFillColor(232,245,243); doc.rect(M, y, W-M*2, 10, "F"); }
    doc.setTextColor(50,50,50); doc.setFont("helvetica","normal"); doc.setFontSize(8);
    tx = startX;
    row.forEach((cell, ci) => {
      const lines = cell.split("\n");
      lines.forEach((ln, li) => doc.text(ln, tx+cols[ci]/2, y+4+(li*4), {align:"center"}));
      tx += cols[ci];
    });
    y += 10;
  });

  // Ligne séparatrice
  doc.setDrawColor(200,222,221); doc.setLineWidth(0.3);
  doc.line(M, y, W-M, y);
  y += 6;

  // Bloc totaux
  const bx = W-M-76, bw = 76;
  doc.setFillColor(26,122,110);
  doc.roundedRect(bx, y, bw, 44, 4, 4, "F");
  doc.setTextColor(255,255,255); doc.setFontSize(8); doc.setFont("helvetica","normal");
  doc.text("Transport aller TTC", bx+4, y+8);
  doc.text(eur(c.allerTTC), bx+bw-4, y+8, {align:"right"});
  if (d.retour==="oui") {
    doc.text("Retour à vide TTC", bx+4, y+14);
    doc.text(eur(c.retourTTC), bx+bw-4, y+14, {align:"right"});
  }
  doc.text("Total HT", bx+4, y+20);
  doc.text(eur(c.totalHT), bx+bw-4, y+20, {align:"right"});
  doc.text("TVA 20%", bx+4, y+26);
  doc.text(eur(c.tvaMnt), bx+bw-4, y+26, {align:"right"});

  doc.setDrawColor(212,168,67); doc.setLineWidth(0.5);
  doc.line(bx+4, y+29, bx+bw-4, y+29);

  doc.setFontSize(11); doc.setFont("helvetica","bold");
  doc.setTextColor(212,168,67);
  doc.text("TOTAL TTC", bx+4, y+36);
  doc.text(eur(c.totalTTC), bx+bw-4, y+36, {align:"right"});

  doc.setFontSize(7.5); doc.setFont("helvetica","normal");
  doc.setTextColor(200,230,225);
  doc.text(`Acompte 50% : ${eur(c.acompte)}`, bx+4, y+42);
  doc.text(`Solde : ${eur(c.solde)}`, bx+bw-4, y+42, {align:"right"});

  y += 50;

  // Paiement
  if (type==="devis") {
    doc.setFillColor(255,249,232);
    doc.roundedRect(M, y, 90, 24, 3, 3, "F");
    doc.setTextColor(154,110,0); doc.setFontSize(7); doc.setFont("helvetica","bold");
    doc.text("MODALITÉS DE PAIEMENT", M+4, y+6);
    doc.setFont("helvetica","normal"); doc.setTextColor(80,80,80); doc.setFontSize(7.5);
    doc.text(`Acompte 50% à la commande : ${eur(c.acompte)}`, M+4, y+12);
    doc.text(`Solde avant prise en charge : ${eur(c.solde)}`, M+4, y+17);
    doc.text("Virement · Chèque · Espèces · PayPal", M+4, y+22);
    y += 28;
  }

  // Bon pour accord (devis) ou date paiement (facture)
  if (type==="devis") {
    doc.setFillColor(240,240,240);
    doc.roundedRect(M, y, W-M*2, 24, 3, 3, "F");
    doc.setTextColor(80,80,80); doc.setFontSize(7); doc.setFont("helvetica","bold");
    doc.text("BON POUR ACCORD — Signature client :", M+4, y+6);
    doc.setFont("helvetica","italic"); doc.setFontSize(7);
    doc.text("Mention manuscrite obligatoire : « Bon pour accord »", M+4, y+11);
    doc.setDrawColor(150,150,150); doc.setLineWidth(0.3);
    doc.line(M+4, y+20, M+80, y+20);
    doc.text("Pour Cathy Pets :", M+90, y+6, {align:"left"});
    doc.line(M+90, y+20, W-M-4, y+20);
    y += 28;
  }

  // Footer légal
  const footerY = 270;
  doc.setDrawColor(26,122,110); doc.setLineWidth(0.5);
  doc.line(M, footerY, W-M, footerY);
  doc.setTextColor(130,130,130); doc.setFontSize(6.5); doc.setFont("helvetica","normal");
  doc.text(`${CP.societe} — SIRET : ${CP.siret} · ${CP.rcs} · TVA : ${CP.tva} · RC Pro : ${CP.rcp}`, W/2, footerY+4, {align:"center"});
  doc.text(`${CP.adresse}, ${CP.cp_ville} · Tél : ${CP.tel_taxi} · ${CP.email} · ${CP.site}`, W/2, footerY+8, {align:"center"});
  doc.text("Transport régi par Règlement CE n°576/2013 et CE n°561/2006 · RGPD UE 2016/679", W/2, footerY+12, {align:"center"});
  if (type==="facture") {
    doc.setTextColor(212,168,67); doc.setFont("helvetica","bold");
    doc.text("CONFORME EN 16931 — FACTUR-X MINIMUM", W/2, footerY+17, {align:"center"});
  }

  const fname = type==="devis" ? `Devis_${d.client||"Client"}_${num}.pdf` : `Facture_${d.client||"Client"}_${num}.pdf`;
  doc.save(fname);
}

// ═══════════════════════════════════════════════════════
//  GÉNÉRATION XML FACTUR-X
// ═══════════════════════════════════════════════════════
function genFacturX() {
  const c = calcDevis();
  const d = state.devis;
  const num = state.quoteNum;
  const today = new Date().toISOString().split("T")[0].replace(/-/g,"");

  const xml = `<?xml version="1.0" encoding="UTF-8"?>
<!-- FACTUR-X EN 16931 — Conforme réforme facturation électronique France 2027 -->
<rsm:CrossIndustryInvoice
  xmlns:rsm="urn:un:unece:uncefact:data:standard:CrossIndustryInvoice:100"
  xmlns:ram="urn:un:unece:uncefact:data:standard:ReusableAggregateBusinessInformationEntity:100"
  xmlns:udt="urn:un:unece:uncefact:data:standard:UnqualifiedDataType:100">

  <rsm:ExchangedDocumentContext>
    <ram:GuidelineSpecifiedDocumentContextParameter>
      <ram:ID>urn:cen.eu:en16931:2017#compliant#urn:factur-x.eu:1p0:en16931</ram:ID>
    </ram:GuidelineSpecifiedDocumentContextParameter>
  </rsm:ExchangedDocumentContext>

  <rsm:ExchangedDocument>
    <ram:ID>${num}</ram:ID>
    <ram:TypeCode>380</ram:TypeCode>
    <ram:IssueDateTime>
      <udt:DateTimeString format="102">${today}</udt:DateTimeString>
    </ram:IssueDateTime>
    <ram:LanguageID>fr</ram:LanguageID>
    <ram:IncludedNote>
      <ram:Content>Transport animalier — ${d.nbAnim} ${d.typeAnim} — ${d.villeD} → ${d.villeA}</ram:Content>
    </ram:IncludedNote>
  </rsm:ExchangedDocument>

  <rsm:SupplyChainTradeTransaction>

    <ram:IncludedSupplyChainTradeLineItem>
      <ram:AssociatedDocumentLineDocument>
        <ram:LineID>1</ram:LineID>
      </ram:AssociatedDocumentLineDocument>
      <ram:SpecifiedTradeProduct>
        <ram:Name>Transport aller avec animaux — ${d.villeD} vers ${d.villeA}</ram:Name>
        <ram:Description>${c.kmA} km · ${d.nbAnim} ${d.typeAnim} · Péages inclus</ram:Description>
      </ram:SpecifiedTradeProduct>
      <ram:SpecifiedLineTradeAgreement>
        <ram:NetPriceProductTradePrice>
          <ram:ChargeAmount>${(c.allerTTC/1.20/Math.max(c.kmA,1)).toFixed(4)}</ram:ChargeAmount>
          <ram:BasisQuantity unitCode="KMT">${c.kmA}</ram:BasisQuantity>
        </ram:NetPriceProductTradePrice>
      </ram:SpecifiedLineTradeAgreement>

      </ram:SpecifiedTradeSettlementHeaderMonetarySummation>
    </ram:ApplicableHeaderTradeSettlement>

  </rsm:SupplyChainTradeTransaction>
</rsm:CrossIndustryInvoice>`;

  const blob = new Blob([xml], {type:"text/xml;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `FacturX_${d.client||"Client"}_${num}.xml`;
  a.click();
}

function renderHeader() {

function renderTabBar() {

  return `<div class="tab-bar">${tabs.map(t=>`

// ─── PAGE TARIFS ─────────────────────────────────────────
function renderTarifs() {
  const simus = [100,200,300,500,800,1000,1200,1500];
  return `
  <div class="card">
    <div class="card-title">💰 Grille tarifaire officielle</div>
    <div style="background:#E8EEF8;border-radius:12px;padding:14px;margin-bottom:10px;">
      <div style="font-size:10px;font-weight:800;color:#1E5FAD;margin-bottom:6px;">ALLER AVEC ANIMAUX</div>
      <div style="font-size:28px;font-weight:900;color:#1E5FAD;">${TARIF_A.toFixed(2)} €<span style="font-size:14px;font-weight:500;">/km TTC</span></div>
      <div style="font-size:11px;color:#6B7878;margin-top:4px;">Tout transport avec animal(aux)</div>
    </div>
    <div style="background:#F3EAF8;border-radius:12px;padding:14px;margin-bottom:10px;">
      <div style="font-size:10px;font-weight:800;color:#7B2D8B;margin-bottom:6px;">RETOUR À VIDE</div>
      <div style="font-size:28px;font-weight:900;color:#7B2D8B;">${TARIF_R.toFixed(2)} €<span style="font-size:14px;font-weight:500;">/km TTC</span></div>
      <div style="font-size:11px;color:#6B7878;margin-top:4px;">Retour sans animal — tous trajets</div>
    </div>
    <div style="background:#FFF9E8;border:1px solid rgba(212,168,67,0.4);border-radius:12px;padding:12px;">
      <div style="font-size:10px;font-weight:800;color:#9A6E00;margin-bottom:4px;">🔒 USAGE INTERNE — non visible client</div>
      <div style="font-size:12px;color:#6B7878;">Surplus +10% sur frais réels (gasoil + péages)</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">📈 Simulateur A/R</div>
    <div style="display:flex;justify-content:space-between;font-size:10px;font-weight:800;color:#6B7878;padding:6px 0;border-bottom:1px solid #EEF5F4;margin-bottom:4px;">
      <span>Distance A/R</span><span>Total TTC</span><span>Marge est.</span>
    </div>
    ${simus.map(km=>{
      const ttc = +(km*TARIF_A+km*TARIF_R).toFixed(0);
      const ht  = +(ttc/1.20).toFixed(0);
      const cout = Math.round(km*2*0.33);
      const marge = Math.round(((ht-cout)/ht)*100);
      const col = marge>30?"#27AE60":marge>20?"#D4A843":"#E74C3C";
      return `<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #EEF5F4;">
        <span style="font-size:13px;color:#6B7878;">${km*2} km</span>
        <span style="font-size:13px;font-weight:700;color:#1C2B2A;">${ttc} €</span>
        <span style="font-size:13px;font-weight:800;color:${col};">≈ ${marge}%</span>
      </div>`;
    }).join("")}
    <div style="font-size:10px;color:#9AABAA;margin-top:8px;font-style:italic;">* Estimation — varie selon péages, temps et diesel</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════
function setTab(t) { state.tab=t; location.hash=t; render(); }
function updateDevis(k,v) { state.devis[k]=v; render(); }
function toggleCheck(id) { state.checks[id]=!state.checks[id]; render(); }
function nouveauNumero() { state.quoteNum=genNum(); render(); }

function copierSignature() {
  navigator.clipboard.writeText(`${CP.gerante}\n${CP.societe} — Taxi & Pension Animalière\nTaxi : ${CP.tel_taxi} · Garde : ${CP.tel_garde}\n${CP.email}\n${CP.site}`);
  alert("✅ Signature copiée !");
}

async function lancerCheck() {
  state.loading.matin = true; state.ai={briefing:"",rdv:"",emails:"",suggestion:""}; render();
  try {
    state.ai.briefing = await callClaude(`Tu es l'assistante de Cathy Pets SAS. Nous sommes le ${todayFR()}. Génère un briefing matinal professionnel pour Cathy DELORME (gérante). Inclus : accueil avec date, priorités du jour, rappel tarifaire (aller ${TARIF_A}€/km · retour ${TARIF_R}€/km), conseil business, motivation. 120 mots max. Français. Emojis.`);
    render();
    state.ai.rdv = await callClaude(`Connecte-toi à Google Calendar de ${CP.email}. Récupère tous les événements d'aujourd'hui ${todayISO()}. Liste heure, titre, lieu. Si aucun, dis-le clairement. 150 mots max. Français.`, true);
    render();
    state.ai.emails = await callClaude(`Connecte-toi à Gmail de ${CP.email}. Récupère les emails non lus d'aujourd'hui ${todayISO()}. Identifie les demandes de devis, confirmations, urgences. Pour chaque : expéditeur, sujet, type, action recommandée. 200 mots max. Français.`, true);
  } catch(e) {
    state.ai.briefing = "⚠️ Erreur de connexion. Vérifiez votre connexion internet.";
  }
  state.loading.matin = false; render();
}

async function analyserEmails() {
  state.loading.analyse = true; render();
  state.ai.suggestion = await callClaude(`Emails Cathy Pets : "${state.ai.emails}". Pour chaque demande de transport, génère une réponse courte professionnelle. Tarifs : aller ${TARIF_A}€/km · retour ${TARIF_R}€/km. 180 mots max. Français.`).catch(()=>"⚠️ Erreur.");
  state.loading.analyse = false; render();
}
